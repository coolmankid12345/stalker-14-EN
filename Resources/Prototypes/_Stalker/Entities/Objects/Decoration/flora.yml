### Base trees

## T1
- type: entity
  parent: BaseTree
  id: STBaseTreeT1
  abstract: true
  name: T1 Tree
  description: You should not see this.
  components:
  - type: Sprite
    noRot: true
    drawdepth: Overdoors
    offset: 0,0.9
  - type: Craftable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 750
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 480
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/tree_fell.ogg
          params:
            volume: 5
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          STLogStalkerT1:
            min: 1
            max: 3

- type: entity
  parent: STBaseTreeT1
  id: STBaseTreeT1RSItrees
  abstract: true
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Decoration/Flora/flora_trees.rsi

- type: entity
  parent: STBaseTreeT1
  id: STBaseTreeT1RSItreenew
  abstract: true
  components:
