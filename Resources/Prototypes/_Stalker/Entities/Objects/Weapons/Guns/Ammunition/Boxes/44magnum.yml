# .44 Remington Magnum Ammo Boxes
# FMJ / HP / AP — small box (30 rounds) + large crate (300 rounds)

- type: entity
  parent: BaseAmmoBoxStalker
  id: 44MagnumFMJBox
  name: Коробка патронов (.44 Magnum) FMJ
  description: В коробке 30 штук. Обеспечивает пробитие 2 класса брони.
  suffix: Stalker
  components:
  - type: Item
    size: Small
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: BallisticAmmoProvider
    proto: CartridgeRemingtonMagnum
    capacity: 30
    whitelist:
      tags:
        - CartridgeRemingtonMagnum
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Boxes/magnum.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  parent: 44MagnumFMJBox
  id: 44MagnumHPBox
  name: Коробка патронов (.44 Magnum) HP
  description: В коробке 30 штук. Бесполезно против брони, но наносит огромный урон небронированным целям.
  suffix: Stalker
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeRemingtonMagnumHP
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Boxes/magnum.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: exp

