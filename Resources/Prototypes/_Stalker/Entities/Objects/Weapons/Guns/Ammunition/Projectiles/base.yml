# Stalker EN Changes - Falloff increased
- type: entity
  abstract: true
  parent: STBaseEntity
  id: STBaseBullet
  categories: [ HideSpawnMenu ]
  components:
    - type: Reflective
    - type: FlyBySound
    - type: Clickable
    - type: Sprite
      noRot: false
      sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
      layers:
        - state: bullet
          shader: unshaded
    - type: Physics
      bodyType: Dynamic
      linearDamping: 0
      angularDamping: 0
    - type: Fixtures
      fixtures:
        projectile:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.1,-0.1,0.1,0.1"
          hard: false
          mask:
            - Impassable
            - BulletImpassable
    - type: Projectile
      impactEffect: BulletImpactEffect
      damage:
        types:
          Piercing: 14
      soundHit:
        path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
    - type: TimedDespawn
      lifetime: 10
    - type: STProjectileAccuracy
      thresholds:
        - range: 1
          falloff: 0.03
    - type: STProjectileDamageFalloff
      thresholds:
        - range: 4
          falloff: 0.2       # Gentle base falloff
        - range: 20
          falloff: 0.8       # Moderate drop
    - type: LagCompensation

- type: entity
  parent: STBaseBullet
  id: STBaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
    - type: TriggerOnCollide
      fixtureID: projectile
    - type: Projectile
      damage:
        types:
          Blunt: 7
    - type: Fixtures
      fixtures:
        projectile:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.15,-0.45,0.15,0.15"
          hard: false
          mask:
            - Impassable
            - BulletImpassable

