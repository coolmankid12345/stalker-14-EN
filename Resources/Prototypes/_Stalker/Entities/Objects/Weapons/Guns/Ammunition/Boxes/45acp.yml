# .45 ACP — FMJ / HP / AP + all vendor alias IDs

- type: entity
  parent: BaseAmmoBoxStalker
  id: 45ACPLFMJBox
  name: Коробка патронов (.45 ACP) FMJ
  description: В коробке 30 штук. Обеспечивает пробитие 1 класса брони.
  suffix: Stalker
  components:
  - type: MagazineVisuals
    magState: 45ammo
  - type: BallisticAmmoProvider
    proto: Cartridge45ACPLFMJ
    capacity: 30
    whitelist:
      tags:
        - Cartridge45ACP
  - type: Sprite
    layers:
    - state: 45(1)
      map: ["enum.GunVisualLayers.Base"]
    - state: 45ammo-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  parent: 45ACPLFMJBox
  id: 45ACPRIPBox
  name: Коробка патронов (.45 ACP) HP
  description: В коробке 30 штук. Бесполезно против брони.
  suffix: Stalker
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge45ACPHydroshock
  - type: Sprite
    layers:
    - state: 45(2)
      map: ["enum.GunVisualLayers.Base"]
    - state: 45ammo2-1
      map: ["enum.GunVisualLayers.Mag"]

