  name: Коробка патронов (.45 ACP) HP
  description: Для пистолетов и револьверов, 30 штук. Бесполезно против брони, но наносит сильный урон небронированным целям.
  suffix: Stalker
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge45ACPHydroshock
  - type: Sprite
    layers:
    - state: 45(2)
      map: ["enum.GunVisualLayers.Base"]
    - state: 45ammo2-1
      map: ["enum.GunVisualLayers.Mag"]

# Vendor alias — same ammo as HP
