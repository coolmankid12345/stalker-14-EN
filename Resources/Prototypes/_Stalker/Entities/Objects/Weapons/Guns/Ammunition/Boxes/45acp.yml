# .45 ACP — FMJ / HP / AP

- type: entity
  parent: BaseAmmoBoxStalker
  id: 45ACPLFMJBox
  name: Коробка патронов (.45 ACP) FMJ
  description: Для пистолетов и револьверов, 30 штук. Обеспечивает пробитие 1 класса брони.
  suffix: Stalker
  components:
  - type: MagazineVisuals
    magState: 45ammo
  - type: BallisticAmmoProvider
    proto: Cartridge45ACPLFMJ
    capacity: 30
    whitelist:
      tags:
        - Cartridge45ACP
  - type: Sprite
    layers:
    - state: 45(1)
      map: ["enum.GunVisualLayers.Base"]
    - state: 45ammo-1
      map: ["enum.GunVisualLayers.Mag"]

# Vendor aliases — same ammo as FMJ
- type: entity
