# 5.45x39 — FMJ / HP / AP + all vendor alias IDs

- type: entity
  parent: BaseAmmoBoxStalker
  id: 545FMJBox
  name: Коробка патронов (5,45x39) FMJ
  description: Для автоматов Калашникова, в коробке 30 штук. Обеспечивает пробитие 3 класса брони.
  suffix: Stalker
  components:
  - type: MagazineVisuals
    magState: 545ammo
  - type: BallisticAmmoProvider
    proto: STCartridge545FMJ
    capacity: 30
    whitelist:
      tags:
        - STCartridge545
  - type: Sprite
    layers:
    - state: 545
      map: ["enum.GunVisualLayers.Base"]
    - state: 545ammo-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  parent: 545FMJBox
  id: 545HPBox
  name: Коробка патронов (5,45x39) HP
  description: Для автоматов Калашникова, в коробке 30 штук. Бесполезно против брони.
  suffix: Stalker
  components:
  - type: BallisticAmmoProvider
    proto: STCartridge545HP
  - type: Sprite
    layers:
    - state: 545
      map: ["enum.GunVisualLayers.Base"]
    - state: 545ammo-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: exp

- type: entity
