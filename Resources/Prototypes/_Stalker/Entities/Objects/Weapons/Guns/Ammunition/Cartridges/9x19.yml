# 9x19
# STALKER-14-EN START
- type: entity
  id: STCartridge919
  name: cartridge (9х19 auto)
  parent: BaseCartridge
  abstract: true
  components:
  - type: STWeight
    self: 0.01
  - type: Tag
    tags:
      - Cartridge
      - STCartridge919
  - type: CartridgeAmmo
    deleteOnSpawn: true
  - type: Sprite
    drawdepth: Items
  - type: Appearance

- type: entity
  id: STCartridge919PSOGJ
  name: Cartridge (9x19 FMJ)
