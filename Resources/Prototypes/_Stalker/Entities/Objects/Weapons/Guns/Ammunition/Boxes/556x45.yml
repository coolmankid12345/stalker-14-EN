# 5.56x45 — FMJ / HP / AP + vendor/map cink aliases

- type: entity
  parent: BaseAmmoBoxStalker
  id: 556FMJBox
  name: Коробка патронов (5,56x45) FMJ
  description: Для штурмовых винтовок, 30 штук. Обеспечивает пробитие 3 класса брони.
  suffix: Stalker
  components:
  - type: MagazineVisuals
    magState: 556ammo
  - type: BallisticAmmoProvider
    proto: Cartridge556FMJ
    capacity: 30
    whitelist:
      tags:
      - STCartridge556
  - type: Sprite
    layers:
    - state: 556
      map: ["enum.GunVisualLayers.Base"]
    - state: 556ammo-1
      map: ["enum.GunVisualLayers.Mag"]

