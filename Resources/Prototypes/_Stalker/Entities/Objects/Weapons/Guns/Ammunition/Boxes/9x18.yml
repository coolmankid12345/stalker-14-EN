# 9x18 — FMJ / HP / AP

- type: entity
  parent: BaseAmmoBoxStalker
  id: 918PGJBox
  name: Коробка патронов (9х18) FMJ
  description: Для ПМм, 30 штук. Обеспечивает пробитие 1 класса брони.
  suffix: Stalker
  components:
  - type: MagazineVisuals
    magState: 919ammo2
  - type: BallisticAmmoProvider
    proto: STCartridge918PGJ
    capacity: 30
    whitelist:
      tags:
        - STCartridge918
  - type: Sprite
    layers:
    - state: 918
      map: ["enum.GunVisualLayers.Base"]
    - state: 919ammo2-1
      map: ["enum.GunVisualLayers.Mag"]

