# .45 ACP
# STALKER-14-EN START
- type: entity
  id: BaseCartridge45ACP
  name: cartridge (.45 ACP auto)
  parent: BaseCartridge
  suffix: Stalker
  abstract: true
  components:
    - type: STWeight
      self: 0.01
    - type: Tag
      tags:
        - Cartridge
        - Cartridge45ACP
    - type: CartridgeAmmo
      deleteOnSpawn: true
    - type: Sprite
      sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
      layers:
        - state: base
          map: ["enum.AmmoVisualLayers.Base"]
    - type: Appearance
    - type: SpentAmmoVisuals
      state: "base"

- type: entity
  id: Cartridge45ACPLFMJ
  name: Cartridge (.45 ACP) FMJ
  parent: BaseCartridge45ACP
  components:
    - type: CartridgeAmmo
      proto: Bullet45ACPFMJ

- type: entity
  id: Cartridge45ACPHydroshock
  name: Cartridge (.45 ACP) HP
  parent: BaseCartridge45ACP
  components:
    - type: CartridgeAmmo
      proto: Bullet45ACPHP
      
- type: entity
  id: Cartridge45ACPMFMJ
  name: Патрон (.45 ACP) AP
  parent: BaseCartridge45ACP
  components:
    - type: CartridgeAmmo
      proto: Bullet45ACPAP

