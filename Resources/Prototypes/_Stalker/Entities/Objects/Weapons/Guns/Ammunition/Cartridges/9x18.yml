# 9x18
# STALKER-14-EN START
- type: entity
  id: BaseSTCartridge918
  name: cartridge (9х18 auto)
  parent: BaseCartridge
  abstract: true
  components:
  - type: STWeight
    self: 0.01
  - type: Tag
    tags:
      - Cartridge
      - STCartridge918
  - type: CartridgeAmmo
    deleteOnSpawn: true
  - type: Sprite
    drawdepth: Items
  - type: Appearance

- type: entity
  id: STCartridge918PGJ
  name: Cartridge (9x18 FMJ)
  parent: BaseSTCartridge918
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: CartridgeAmmo
    proto: Bullet918PGJ
  - type: SpentAmmoVisuals
    state: "base"

- type: entity
  id: STCartridge918PST
  name: Cartridge (9x18 HP)
  parent: BaseSTCartridge918
  components:
