    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: CartridgeAmmo
    proto: Bullet918PST
  - type: SpentAmmoVisuals
    state: "base"

- type: entity
  id: STCartridge918PBM
  name: Cartridge (9x18 AP)
  parent: BaseSTCartridge918
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: CartridgeAmmo
