# Character portrait prototypes for PDA notifications.
#
# TEXTURE LOCATION:
#   Place PNG files in: /Textures/_Stalker_EN/Portraits/
#   Recommended size: 100x160 pixels
#
# Each portrait prototype represents ONE role and can have MULTIPLE texture variants.
# NPCs pick one randomly. Players choose one in the loadout screen.
#
# NOTE: Currently using scalar string format for PNG files (SpriteSpecifier.Texture).
# To use RSI format, convert PNG to RSI and use sprite: + state: keys.

# MARK: Stalker (Department: Stalker)

- type: characterPortrait
  id: Portrait_StalkerRookie
  name: st-portrait-rookie-stalker
  bandId: STStalkerBand
  jobId: StalkerRookie
  textures:
    - "/Textures/_Stalker_EN/Portraits/stalkers/rookies/rookie_1.png"
