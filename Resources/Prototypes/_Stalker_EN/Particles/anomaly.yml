      value: 0.4
    - time: 0.9
      value: 0
  sizeOverLifetime:
    - time: 0
      value: 0.3
    - time: 0.2
      value: 0.6
    - time: 0.9
      value: 1.7
  startColor: "#161616"
  lifetime: 0.9
  lifetimeVariance: 0
  speed: 0.5
  speedVariance: 0.25
  particleSize: 0.8
  sizeVariance: 0.2
  stretchFactor: 0
