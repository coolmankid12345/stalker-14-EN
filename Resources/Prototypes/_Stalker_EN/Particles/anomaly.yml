# Thermals
- type: particleEffect
  id: BurnerSpark
  sprite:
    sprite: _Starfall/Particles/generic.rsi
    state: dot
  shader: unshaded
  colorOverLifetime:
    - time: 0.0
      color: "#FFFFFFFF"
    - time: 0.1
      color: "#FFEE88FF"
    - time: 0.5
      color: "#FF8800BB"
    - time: 1.0
      color: "#FF220000"
  sizeOverLifetime:
    - time: 0.0
      value: 1
    - time: 0.5
      value: 0.6
    - time: 1
      value: 0
  alphaOverLifetime:
    - time: 0.0
      value: 0.8
    - time: 1
      value: 0
  lifetime: 1
  lifetimeVariance: 0.25
  speed: 1
  speedVariance: 0.25
  particleSize: 1
  stretchFactor: 0
  emissionRate: 10
  maxCount: 20
  burst: false
  duration: 0
  gravity: -4
  drag: 2
  spreadAngle: 90
  emitAngle: 0
  noiseStrength: 1
  noiseFrequency: 8
  shape:
    type: CircleFill
    radius: 0.2

