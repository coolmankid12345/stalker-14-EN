# City contract board set for supported execution modes.

- type: storeContractPack
  id: TradeContractsCityPack
  contracts:
  - id: trade_contract_ZoneArtifactVyvert
    weight: 100
    cooldownMinutes: 1
  - id: trade_contract_ArtMedusa
    weight: 100
    cooldownMinutes: 2
  - id: trade_contract_MutantPartFleshEye
    weight: 100
    cooldownMinutes: 3
  - id: trade_contract_MutantPartBlindDogTail
    weight: 100
    cooldownMinutes: 4
  - id: trade_contract_delivery_BoxCrate
    weight: 100
    cooldownMinutes: 5
  - id: trade_contract_recovery_BoxCrate
    weight: 100
    cooldownMinutes: 6
  - id: trade_contract_hunt_old_boar
    weight: 100
    cooldownMinutes: 7
  - id: trade_contract_delivery_TechCardCalibrationDosimeter
    weight: 100
    cooldownMinutes: 8
  - id: trade_contract_delivery_STMobMutantBearPsiUncommon
    weight: 100
    cooldownMinutes: 9
  - id: trade_contract_delivery_STMobMutantBloodsuckerUncommon
    weight: 100
    cooldownMinutes: 10
  - id: trade_contract_delivery_MobMutantPoltergeistIce
    weight: 100
    cooldownMinutes: 1
  - id: trade_contract_delivery_STMobMutantBearT2Common
    weight: 100
    cooldownMinutes: 2
  - id: trade_contract_delivery_STMobMutantPseudodogLegendary
    weight: 100
    cooldownMinutes: 3
  - id: trade_contract_delivery_MobMutantLeshiy
    weight: 100
    cooldownMinutes: 4

- type: storeContractsPreset
  id: TradeContractsCityPreset
  limits:
    Easy: 3
    Medium: 2
    Hard: 1
  packs:
  - id: TradeContractsCityPack
    weight: 1

# ----------------------------
# Regular delivery
# ----------------------------

- type: storeContract
  id: trade_contract_ZoneArtifactVyvert
  name: "Retrieve a Vyvert"
  description: "Need a Vyvert for ointment. Respected Zhaba's back is acting up."
  difficulty: Easy
  targets:
  - id: ZoneArtifactVyvert
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: ContractRewardEasy

