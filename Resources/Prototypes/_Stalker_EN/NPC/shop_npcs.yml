# spawner
- type: entity
  id: STFleaMarketSpawner
  name: fleamarket (Random NPC)
  suffix: Stalker, EN-SHOP
  parent: FlexibleMarker
  categories: [ Spawner, StSkipSpawnTest ]
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _Stalker/NPC/Security.rsi
      state: security
  - type: RandomSpawner
