- type: entity
  parent: NPCDoll
  id: NPCUncle
  name: Uncle [→   ←]
  suffix: ST, EN-TRADER
  description: He smells like weed and beer and he looks like he's ready to get back to the lake.
  components:
  - type: Sprite
    sprite: _Stalker_EN/NPC/uncle.rsi
    state: unc
  - type: Physics
    bodyType: Static
  - type: Vocalizer
  - type: DatasetVocalizer
    dataset: NPCStalkerUncleAds
  - type: ActivatableUI
    key: enum.ShopUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.ShopUiKey.Key:
        type: ShopBoundUserInterface
  - type: Shop
    moneyId: Roubles
    shopPresetId: STFishShopPreset
  - type: TypingIndicator
    proto: robot
  - type: TTS # Corvax-TTS
    voice: TrainingRobot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Alto
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
  - type: ActiveRadio
    channels:
    - Binary
    - Common

