- type: entity
  name: Zombified Melee
  suffix: Stalker, Т2
  parent: BaseMobMutant
  id: MobStalkerZombieMeleeBase
  description: A poor person who has lost his mind to the Zone...
  components:
  - type: Stamina
    decay: 14
    cooldown: 5
    critThreshold: 600
  - type: Sprite
    layers:
    - map:
      - enum.DamageStateVisualLayers.Base
      state: zombie
      sprite: /Textures/_Stalker_EN/Mobs/Mutants/Zombified/Melee/Zombiecivillian1.rsi
  - type: DamageStateVisuals
    states:
      Alive:
        Base: zombie
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: Bands
    band: Zombie
    bandIcon: zombieEN
  - type: Vocalizer
    minVocalizeInterval: 1m
    maxVocalizeInterval: 2m
    hideChat: false
  - type: DatasetVocalizer
    dataset: SayStalkerZombie
  - type: Speech
    speechSounds: STZombie # stalker EN change
  - type: Vocal
    sounds:
      Male: MaleHuman
      Female: FemaleHuman
      Unsexed: MaleHuman
  - type: ApproachEmitter # ST14-EN: changed zeroing to be `enabled: false`
    enabled: false
  - type: STWeight
    self: 90
  - type: MobThresholds
    thresholds:
      0: Alive
      80: Critical
      160: Dead
  - type: PassiveDamage
    damageCap: 250
    damage:
      groups:
        Burn: -100
        Toxin: -100
        Airloss: -100
        Brute: -3
  - type: MeleeWeapon
    attackRate: 0.8
    angle: 30
    range: 1.4
    soundHit:
      path: "/Audio/Weapons/punch1.ogg"
    animation: WeaponArcFist
    wideAnimation: WeaponArcFist
    damage:
      types:
        Blunt: 20
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.5
    baseSprintSpeed: 2.0
  - type: StaminaDamageOnHit
    damage: 10 
  - type: Armor
    modifiers:
     coefficients:
       Mutant: 1
  - type: Butcherable
    spawned:
      - id: MutantPartZombieHand
        maxAmount: 1
        prob: 1
  # Stalker-EN start
  - type: EmitSoundOnTrigger
    sound:
      collection: STZombieSpotted
      params:
        variation: 0.125
  - type: STMobVariantConfig
    variants:
    - chance: 0.08
      quality: Uncommon
      nameOverride: st-mob-variant-uncommon-zombie
      healthMultiplier: 1.1
      damageMultiplier: 1.1
      spriteScale: 1.05
      spriteTint: "#805030FF"
      spriteSaturation: 1.5
      spriteBrightness: 0.7
      minWeightMultiplier: 0.95
      maxWeightMultiplier: 1.25
      butcherSwaps:
        MutantPartZombieHand: STMutantPartUncommonZombieHand
    - chance: 0.02
      quality: Rare
      nameOverride: st-mob-variant-rare-zombie
      healthMultiplier: 1.2
      damageMultiplier: 1.2
      spriteScale: 1.1
      spriteTint: "#E0D8FFFF"
      spriteSaturation: 0.15
      spriteBrightness: 1.6
      minWeightMultiplier: 1.1
      maxWeightMultiplier: 1.4
      butcherSwaps:
        MutantPartZombieHand: STMutantPartRareZombieHand
    - chance: 0.001
      quality: Legendary
      nameOverride: st-mob-variant-legendary-zombie
      healthMultiplier: 1.3
      damageMultiplier: 1.3
      spriteScale: 1.15
      spriteTint: "#FFC040FF"
      spriteSaturation: 1.3
      spriteBrightness: 1.4
      minWeightMultiplier: 1.3
      maxWeightMultiplier: 1.6
      butcherSwaps:
        MutantPartZombieHand: STMutantPartLegendaryZombieHand 

