- type: entity
  parent: BaseItem
  id: ArtifactShards
  name: Artifact Shards
  description: A shard of a broken artifact.
  suffix: Stalker
  components:
    - type: PhysicalComposition
      materialComposition:
        Credit: 1
    - type: Stack
      stackType: ArtifactShards
      count: 1
      baseLayer: base
      layerStates:
      - cash
      - cash_10
      - cash_100
      layerFunction: Threshold
    - type: StackLayerThreshold
      thresholds: [3, 10]
    - type: Sprite
      sprite: _Stalker_EN/Objects/Economy/artifact_shards.rsi
      state: cash
      layers:
      - state: cash
        map: ["base"]
    - type: Item
      sprite: _Stalker_EN/Objects/Economy/artifact_shards.rsi
      size: Small
    - type: Physics
      bodyType: Dynamic
    - type: Fixtures
      fixtures:
        fix1:
          density: 30
          shape:
            !type:PhysShapeAabb
            bounds: "-0.35,-0.2,0.25,0.1"
          mask:
          - ItemMask
    - type: Appearance
    - type: Tag
      tags:
      - ArtifactShards
    - type: RepositoryItem
      categoryName: repository-currency-category

- type: currency
  id: ArtifactShards
  displayName: store-currency-display-artifactshards
  cash:
    1: ArtifactShards
  canWithdraw: true

- type: stack
  id: ArtifactShards
  name: stack-hryvnias
  icon: { sprite: /Textures/_Stalker_EN/Objects/Economy/artifact_shards.rsi, state: cash }
  spawn: ArtifactShards
  splitAmounts: [1, 5, 10, 25, 50, 100, 500]

- type: entity
  parent: ArtifactShards
  id: ArtifactShards5
  suffix: Stalker, 5
  components:
  - type: Icon
    sprite: _Stalker_EN/Objects/Economy/artifact_shards.rsi
    state: cash_10
  - type: Stack
    count: 5

- type: entity
