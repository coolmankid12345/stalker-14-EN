- type: entity
  parent: ZoneAnomalyBaseElectrical
  id: ZoneAnomalyClicker
  suffix: Stalker, Clicker, Anomaly
  components: 
    - type: ZoneAnomalyUpdateTriggerCollide
    - type: ZoneAnomalyEffectPlaySound
      sound: /Audio/_Stalker/Effects/electra_blast.ogg
    - type: ZoneAnomaly
      detectedLevel: 3
      preparingDelay: 0
      activationDelay: 0.3
      chargeTime: 5
    - type: Sprite
      sprite: _Stalker_EN/Objects/Anomalies/clicker.rsi
      layers:
      - state: idle
        map: ["base"]
        shader: unshaded
    - type: GenericVisualizer
      visuals:
        enum.ZoneAnomalyVisuals.Layer:
          base:
            Activated: { state: idle  }
            Charging: { state: charging}
            Idle: { state: idle }
    - type: AmbientSound
      enabled: true
      volume: -5
      range: 8
      sound:
        path: /Audio/_Stalker/Effects/electra_idle.ogg
    - type: ZoneAnomalyEffectFlash
      range: 1
    - type: ZoneArtifactSpawner
      artifacts:
        - id: null
          ratio: 350
        - id: ZoneArtifactSparkler
          tier: 1
          ratio: 10
        - id: ZoneArtifactBattery
          tier: 2
          ratio: 5
        - id: ZoneArtifactAccumulator
          tier: 2
          ratio: 8
        - id: ZoneArtifactArf
          tier: 3
          ratio: 5