- type: entity
  id: CigarGoldColonel
  parent: Cigar
  name: Colonel's Cigar
  description: A cigar so strong it has its own clearance level. Guaranteed to increase authority by 200%
  suffix: ADMEME
  components:
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cigars/cigar-gold.rsi
    state: unlit-icon
  - type: Clothing
    sprite: Objects/Consumable/Smokeables/Cigars/cigar-gold.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 10000000
        reagents:
        - ReagentId: Nicotine
          Quantity: 10000000


- type: entity
  id: JointAtaman
  parent: BaseCigar
  name: Ataman's Eternal Blunt
  description: Legend says this blunt has been in rotation since the first faction meeting.
  suffix: ADMEME
  components:
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cannabis/joint.rsi
    state: unlit-icon
  - type: Tag
    tags:
    - Cigarette
    - Trash
  - type: SpaceGarbage
  - type: Clothing
    sprite: Objects/Consumable/Smokeables/Cannabis/joint.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
  - type: Construction
    graph: smokeableJoint
    node: joint
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 10000000
        reagents:
        - ReagentId: THC
          Quantity: 10000000

- type: entity
  id: CigPackBub
  parent: BaseStorageItem
  name: greyman's specials pack
  description: An old rolling paper packet full of Greyman's special cigarettes. You feel more surgically inclined while smoking them.
  components:
  - type: Storage
    grid:
    - 0,0,4,1
    whitelist:
      tags:
      - RollingPaper
      - CigFilter
      - Smokable
      - Cigarette
      - Lighters
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cigarettes/paper.rsi
    state: cigpapers
  - type: Item
    sprite: Objects/Consumable/Smokeables/Cigarettes/paper.rsi
  - type: StorageFill
    contents:
    - id: CigaretteBub
      amount: 10

- type: entity
  id: CigaretteBub
  parent: Cigarette
  name: greyman's specials cigarette
  components:
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 20
        reagents:
        - ReagentId: Nicotine
          Quantity: 10
        - ReagentId: Tricordrazine
          Quantity: 2.5
        - ReagentId: Nutriment
          Quantity: 2.5
        - ReagentId: Vitamin
          Quantity: 2.5
        - ReagentId: Water
          Quantity: 2.5
