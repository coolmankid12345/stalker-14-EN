- type: entity
  id: CigarGoldColonel
  parent: Cigar
  name: Colonel's Cigar
  description: A cigar so strong it has its own clearance level. Guaranteed to increase authority by 200%
  suffix: ADMEME
  components:
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cigars/cigar-gold.rsi
    state: unlit-icon
  - type: Clothing
    sprite: Objects/Consumable/Smokeables/Cigars/cigar-gold.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 10000000
        reagents:
        - ReagentId: Nicotine
          Quantity: 10000000


- type: entity
  id: JointAtaman
  parent: BaseCigar
  name: Ataman's Eternal Blunt
  description: Legend says this blunt has been in rotation since the first faction meeting.
  suffix: ADMEME
  components:
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cannabis/joint.rsi
    state: unlit-icon
  - type: Tag
    tags:
    - Cigarette
    - Trash
  - type: SpaceGarbage
  - type: Clothing
    sprite: Objects/Consumable/Smokeables/Cannabis/joint.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
  - type: Construction
    graph: smokeableJoint
    node: joint
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 10000000
        reagents:
        - ReagentId: THC
          Quantity: 10000000

- type: entity
  id: CigPackBub
  parent: CigPackBase
  name: greyman's specials pack
  description: An old cigarette packet full of Greyman's Specials cigarettes. You feel more surgically inclined while smoking them.
  components:
  - type: Storage
    grid:
    - 0,0,4,1
    whitelist:
      tags:
      - RollingPaper
      - CigFilter
      - Smokable
      - Cigarette
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: CigaretteBub
        amount: 10
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Smokables/greymans_specials.rsi
    layers:
    - state: closed
      map: ["closeLayer"]
    - state: open
      map: ["openLayer"]
      visible: false
    - state: cig1
      map: ["cig1"]
      visible: false
    - state: cig2
      map: ["cig2"]
      visible: false
    - state: cig3
      map: ["cig3"]
      visible: false
    - state: cig4
      map: ["cig4"]
      visible: false
    - state: cig5
      map: ["cig5"]
      visible: false
    - state: cig6
      map: ["cig6"]
      visible: false
  - type: Item
    sprite: _Stalker_EN/Objects/Consumable/Smokables/greymans_specials.rsi

- type: entity
  id: CigaretteBub
  parent: Cigarette
  name: greyman's specials cigarette
  components:
  - type: Sprite
    color: gray
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 20
        reagents:
        - ReagentId: Nicotine
          Quantity: 10
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Water
          Quantity: 5

- type: entity
  id: CigaretteLead
  parent: SoakedCigarette
  name: Metal Head
  components:
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 40
        reagents:
        - ReagentId: Nicotine
          Quantity: 10
        - ReagentId: Lead
          Quantity: 10

- type: entity
  id: JointLarge
  parent: BaseCigar
  name: comedically large blunt
  description: This thing is the size of your forearm, it's a wonder you can even hold it, let alone smoke it. Try not to green out.
  components:
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Smokables/big_ass_blunt/icon.rsi
    state: unlit-icon
  - type: Tag
    tags:
    - Cigarette
    - Trash
  - type: SpaceGarbage
  - type: Clothing
    sprite: _Stalker_EN/Objects/Consumable/Smokables/big_ass_blunt/worn_inhands.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Normal
    shape:
    - 0,0,0,3
    storedRotation: -45
    inhandVisuals:
      left:
      - state: unlit-inhand-left
      right:
      - state: unlit-inhand-right
  - type: Construction
    graph: smokeableJoint
    node: joint
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 350
        reagents:
        - ReagentId: THC
          Quantity: 300
