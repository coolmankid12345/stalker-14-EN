####################################
- type: entity
  name: Syringe of Meth
  parent: Stimpack
  id: MethMedpipepStalker
  suffix: Stalker
  description: A Syringe of meth
  components:
  - type: sprite
    sprite: Resources\Textures\Objects\Specific\Chemistry\syringe.rsi
    state: syringe_base0
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 20
        reagents:
        - ReagentId: Desoxyephedrine
          Quantity: 20
  - type: Hypospray
    solutionName: pen
    onlyAffectsMobs: false
    transferAmount: 20
    injectOnly: true
####################################
- type: entity
  id: Cocainedust
  parent: BaseItem
  name:  Cocaine
  suffix: Stalker
  description: Pure columbian imported from outside the zone.
  components:
  - type: Tag
    tags:
      - Pill
  - type: Item
    size: Tiny
  - type: RepositoryItem
    categoryName: repository-medicine-category
  - type: Sprite
    sprite: Objects/Misc/reagent_fillings.rsi
    state: powderpile
    color: darkgray
  - type: Edible
    forceFeedDelay: 1
    transferAmount: null
    edible: Pill
  - type: BadFood
  - type: FlavorProfile
    ignoreReagents: []
  - type: DeleteOnTrigger
  - type: Extractable
    grindableSolutionName: food
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:SpillBehavior
        solution: food
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Cocaine
          Quantity: 10
