- type: entity
  name: house key
  parent: BaseItem
  suffix: Stalker, Key
  id: STKeyHouse
  description: A plain house key, though grime and rust clings to it.
  components:
  - type: STWeight
    self: 0.01
  - type: Sprite
    sprite: _Stalker_EN/Objects/Misc/keys.rsi
    state: key_house
  - type: Item
    size: Tiny
    shape:
    - 0,0,0,0
  - type: RepositoryItem
    categoryName: repository-miscellaneous-category

