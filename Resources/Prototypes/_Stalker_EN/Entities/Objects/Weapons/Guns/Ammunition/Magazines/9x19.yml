- type: entity
  id: BaseSTC96Clip
  name: Mauser C96 Stripper Clip (10)
  description: "A 10-round stripper clip for the Mauser C96, used to quickly load 9x19mm rounds into the internal magazine. They sell empty."
  suffix: Stalker
  parent: BaseItem
  abstract: true
  components:
    - type: STBulkBuyable
      maxQuantity: 10
    - type: Tag
      tags:
        - C96Clip
    - type: Item
      size: Small
      shape:
      - 0,0,0,0
    - type: SpeedLoader
    - type: BallisticAmmoProvider
      whitelist:
        tags:
          - STCartridge919
      capacity: 10
    - type: Sprite
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
          ents: []
        item_slot: !type:ContainerSlot {}
    - type: RepositoryItem
      categoryName: repository-magazines-category

- type: entity
  parent: BaseSTC96Clip
  id: STC96Clip
  categories: [ HideSpawnMenu ]
  name: Mauser C96 Stripper Clip (9x19mm)
  suffix: Stalker
  components:
    - type: BallisticAmmoProvider
      proto: STCartridge919
    - type: Sprite
      sprite: _Stalker_EN/Objects/Weapons/Guns/Ammunition/Magazines/919/C96/10.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: base-2
          map: ["enum.GunVisualLayers.Mag"]
    - type: MagazineVisuals
      magState: base
      steps: 3
      zeroVisible: false
    - type: Appearance

- type: entity
  parent: STC96Clip
  id: STSTC96ClipEmpty
  suffix: Stalker
  components:
    - type: BallisticAmmoProvider
      proto: null
