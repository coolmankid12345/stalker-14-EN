- type: entity
  id: BaseSTSpeedLoader357Magnum
  name: Speedloader (.357 Magnum)
  description: "An empty speedloader for .357 Magnum cartridges."
  suffix: Stalker
  parent: BaseItem
  abstract: true
  components:
    - type: STBulkBuyable
      maxQuantity: 10
    - type: Tag
      tags:
        - SpeedLoader357Magnum
    - type: SpeedLoader
    - type: BallisticAmmoProvider
      whitelist:
        tags:
          - Cartridge357Magnum
      capacity: 8
    - type: Sprite
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
          ents: []
        item_slot: !type:ContainerSlot {}
    - type: RepositoryItem
      categoryName: repository-magazines-category
    - type: ItemSlots
      slots:
        item_slot:
          name: mop-bucket-slot-component-slot-name-item123
          ejectVerbText: mop-bucket-slot-component-eject-verb123
          whitelist:
            tags:
              - STElasticRubberRed
              - STElasticRubberGreen
              - STElasticRubberBlue
    - type: ItemMapper
      mapLayers:
        red:
          whitelist:
            tags:
              - STElasticRubberRed
        green:
          whitelist:
            tags:
              - STElasticRubberGreen
        blue:
          whitelist:
            tags:
              - STElasticRubberBlue
      sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/speed_loader/elastic_rubber.rsi

- type: entity
  parent: BaseSTSpeedLoader357Magnum
  id: STSpeedLoader357Magnum
  categories: [ HideSpawnMenu ]
  name: Speedloader (.357 magnum)
  suffix: Stalker
  components:
    - type: BallisticAmmoProvider
      proto: Cartridge357MagnumFMJ
    - type: Sprite
      sprite: Objects/Weapons/Guns/Ammunition/SpeedLoaders/Magnum/magnum_speed_loader.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: base-6
          map: ["enum.GunVisualLayers.Mag"]
    - type: MagazineVisuals
      magState: base
      steps: 7
      zeroVisible: false
    - type: Appearance

- type: entity
  parent: STSpeedLoader357Magnum
  id: STSpeedLoader357MagnumEmpty
  suffix: Stalker
  components:
    - type: BallisticAmmoProvider
      proto: null

- type: entity
  id: BaseDEMag
  name: Desert Eagle Magazine
  description: A magazine for .357 Magnum, fitted for use with desert eagle handguns. They sell empty.
  parent: BaseItem
  suffix: Stalker
  categories: [ HideSpawnMenu ]
  components:
  - type: STWeight
    self: 0.5
  - type: Sprite
    sprite: _Stalker_EN/Objects/Weapons/Guns/Ammunition/Magazines/45/deserteagle/8.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Tag
    tags:
    - MagazineDesertEagle
  - type: Item
    size: Small
    shape:
    - 0,0,0,1
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: RepositoryItem
    categoryName: repository-magazines-category

- type: entity
  id: DEMag8
  name: Desert Eagle Magazine (8)
  parent: BaseDEMag
  suffix: Stalker
  components:
  - type: BallisticAmmoProvider
    proto:
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge357Magnum
    capacity: 8
  - type: Sprite
    sprite: _Stalker_EN/Objects/Weapons/Guns/Ammunition/Magazines/45/deserteagle/8.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  id: DEMag15
  name: Desert Eagle Magazine (15)
  parent: BaseDEMag
  suffix: Stalker
  components:
  - type: BallisticAmmoProvider
    proto:
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge357Magnum
    capacity: 15
  - type: Sprite
    sprite: _Stalker_EN/Objects/Weapons/Guns/Ammunition/Magazines/45/deserteagle/15.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
