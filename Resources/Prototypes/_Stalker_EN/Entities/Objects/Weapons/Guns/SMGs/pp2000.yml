- type: entity
  abstract: true
  parent: STBaseWeaponSMG
  id: STBaseWeaponSMGPP2000
  components:
    - type: STWeight
      self: 1.5
    - type: Item
      sprite: _Stalker_EN/Objects/Weapons/Guns/SMGs/pp2000/inhand.rsi
    - type: Sprite
      sprite: _Stalker_EN/Objects/Weapons/Guns/SMGs/pp2000/icon.rsi
    - type: Clothing
      sprite: _Stalker_EN/Objects/Weapons/Guns/SMGs/pp2000/inhand.rsi
    - type: Gun
      projectileSpeed: 52
      minAngle: 40
      maxAngle: 80
      angleIncrease: 2
      selectedMode: FullAuto
      availableModes:
      - Burst
      - SemiAuto
      - FullAuto
      angleDecay: 12
      fireRate: 8.5
      soundGunshot:
        path: /Audio/_Stalker/Effects/Guns/919.ogg
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: VityazMag
          insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
          ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
          priority: 2
          whitelist:
            tags:
            - MagazineVityaz
        gun_module_muzzle:
          name: Muzzle
          priority: 3
          whitelist:
            tags:
            - STWeaponModuleSMGSilencer
        gun_module_underbarrel:
          name: Underbarrel
          priority: 2
          whitelist:
            tags:
            - STWeaponModuleSMGGrip
        gun_chamber:
          name: Chamber
          startingItem: STCartridge919PSOGJ
          priority: 1
          whitelist:
            tags:
            - STCartridge919

- type: entity
  parent: STBaseWeaponSMGPP2000
  id: STWeaponSMGPP2000
  name: PP2000
  description: The modern Russian PP2000 submachine gun chambered in 9x19mm. Its light weight makes it ideal for carrying around the zone.

- type: entity
  parent: STWeaponSMGPP2000
  id: STWeaponSMGPP2000OTS
  name: OTs-126
  description: The civilian carbine version of the PP2000 chambered in 9x19mm. Its less compact then the military counterpart but has better ergonomics. Lacks a full auto setting.
  components:
    - type: STWeight
      self: 2
    - type: Gun
      projectileSpeed: 52
      minAngle: 20
      maxAngle: 60
      angleIncrease: 1.8
      selectedMode: SemiAuto
      availableModes:
      - SemiAuto
      angleDecay: 13
      fireRate: 9.5 # better firerate at semiauto and better control
      soundGunshot:
        path: /Audio/_Stalker/Effects/Guns/919.ogg
    - type: Item
      sprite: _Stalker_EN/Objects/Weapons/Guns/SMGs/ots/inhand.rsi
    - type: Sprite
      sprite: _Stalker_EN/Objects/Weapons/Guns/SMGs/ots/icon.rsi
    - type: Clothing
      sprite: _Stalker_EN/Objects/Weapons/Guns/SMGs/ots/inhand.rsi
