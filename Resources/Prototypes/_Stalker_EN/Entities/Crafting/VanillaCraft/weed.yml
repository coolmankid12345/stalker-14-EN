### leaves

- type: entity
  name: soothing barrels
  parent: ProduceBase
  id: STLeavesCannabisSoothing
  suffix: ST, Stalker, craft
  description: At first glance, ordinary marijuana buds. Probably due to the abnormal effect of the local soil on the seeds, the fruits acquired an unusual color. Seems to be soothing.
  components:
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/cannabis.rsi
    color: teal
  - type: Produce
