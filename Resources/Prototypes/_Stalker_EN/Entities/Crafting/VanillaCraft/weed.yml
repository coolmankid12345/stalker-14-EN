### joints

- type: entity
  id: STJointSoothing
  suffix: ST, Stalker, craft
  parent: STBaseCigar
  name: soothing picket fence
  description: A tightly packed picket of local sativa. Holding it in your teeth, you are overwhelmed with an intoxicating feeling of freedom. All that remains is to blow smoke and have a good time. Seems to be soothing.
  components:
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cannabis/joint.rsi
    state: unlit-icon
  - type: Clothing
    sprite: Objects/Consumable/Smokeables/Cannabis/joint.rsi
    slots: [ mask ]
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 40
        reagents:
        - ReagentId: THC
          Quantity: 20
        - ReagentId: Tricordrazine
          Quantity: 14
        - ReagentId: Omnizine
          Quantity: 6

- type: entity
  id: STJointInvigorating
  suffix: ST, Stalker, craft
