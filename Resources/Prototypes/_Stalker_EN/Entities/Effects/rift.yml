- type: entity
  id: EffectRiftEnter
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 4
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: Effects/emp.rsi
      state: emp_pulse
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu
  - type: AnimationPlayer
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Stalker_EN/Effects/Anomalies/teleport_work_1.ogg

- type: entity
  id: EffectRiftExit
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 4
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: Effects/emp.rsi
      state: emp_pulse
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu
  - type: AnimationPlayer
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Stalker_EN/Effects/Anomalies/teleport_work_2.ogg
